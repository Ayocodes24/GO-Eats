syntax = "proto3";

package restaurant;

option go_package = "github.com/Ayocodes24/GO-Eats/pkg/proto/restaurant;restaurantpb";

service RestaurantService {
  rpc GetMenuItem (GetMenuItemRequest) returns (GetMenuItemResponse);
}

message GetMenuItemRequest {
  int64 menu_id = 1;
}

message GetMenuItemResponse {
  int64  menu_id       = 1;
  string name          = 2;
  double price         = 3;
  int64  restaurant_id = 4;
}
